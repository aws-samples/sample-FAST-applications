name: Python Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed Python files
        id: changed-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46
        with:
          files: |
            samples/**/*.py

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v3

      - name: Install ruff
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv tool install ruff

      - name: Run ruff per sample directory
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          # Discover which sample directories have changed Python files
          SAMPLE_DIRS=$(echo "${ALL_CHANGED_FILES}" | tr ' ' '\n' | sed -n 's|\(samples/[^/]*\)/.*|\1|p' | sort -u)

          for sample_dir in $SAMPLE_DIRS; do
            echo "=== Checking $sample_dir ==="
            cd "$sample_dir"
            uv tool run ruff check
            uv tool run ruff format --check
            cd "$GITHUB_WORKSPACE"
          done

      - name: Skip message
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "No Python files changed - skipping Python linting"
